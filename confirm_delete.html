{% extends "base.html" %}
{% block title %}Delete {{ movie['title'] }} — CineVault{% endblock %}

{% block content %}
<a href="/movie/{{ movie['id'] }}" style="display:inline-block;color:var(--muted);text-decoration:none;font-size:0.82rem;margin-bottom:1.5rem">← Back</a>

<div class="form-card">
  <div class="form-title">Delete Movie</div>
  <p style="color:var(--muted);margin-bottom:1.5rem;font-size:0.9rem;line-height:1.6">
    Are you sure you want to delete <strong style="color:var(--text)">{{ movie['title'] }}</strong>? This cannot be undone.
  </p>
  <form method="post" action="/delete/{{ movie['id'] }}">
    <div class="form-actions">
      <button type="submit" class="btn btn-red">Yes, Delete</button>
      <a href="/movie/{{ movie['id'] }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
