{% extends "base.html" %}
{% block title %}Add Movie — CineVault{% endblock %}

{% block content %}
<a href="/" style="display:inline-block;color:var(--muted);text-decoration:none;font-size:0.82rem;margin-bottom:1.5rem">← Back</a>

<div class="form-card">
  <div class="form-title">Add New Movie</div>
  <form method="post" action="/add">
    <div class="form-group">
      <label>Title *</label>
      <input type="text" name="title" required placeholder="e.g. The Matrix">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Year</label>
        <input type="number" name="year" placeholder="1999" min="1888" max="2099">
      </div>
      <div class="form-group">
        <label>Rating (0–10)</label>
        <input type="number" name="rating" placeholder="8.7" step="0.1" min="0" max="10">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration</label>
        <input type="text" name="duration" placeholder="136 min">
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" name="genre" placeholder="Sci-Fi">
      </div>
    </div>
    <div class="form-group">
      <label>Director</label>
      <input type="text" name="director" placeholder="Lana Wachowski">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="desc" placeholder="Brief plot summary…"></textarea>
    </div>
    <div class="form-group">
      <label>Video URL</label>
      <input type="url" name="video_url" placeholder="https://example.com/movie.mp4">
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="url" name="image_url" placeholder="https://example.com/poster.jpg">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-accent">Add Movie</button>
      <a href="/" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
